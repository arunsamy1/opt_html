<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown to HTML Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 24px 32px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    p.subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover { background: #1d4ed8; }

    .btn-export {
      background: #16a34a;
      color: #fff;
      margin-top: 16px;
    }

    .btn-export:hover { background: #15803d; }

    #file-input { display: none; }

    .status {
      margin-top: 24px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .status.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .file-info {
      margin-top: 20px;
      font-size: 0.88rem;
      color: #555;
      display: none;
    }

    .actions {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Markdown to HTML</h1>
    <p class="subtitle">Select a <code>.md</code> file to convert it to an HTML document.</p>

    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
      Choose .md File
    </button>
    <input type="file" id="file-input" accept=".md" onchange="handleFile(event)">

    <div class="file-info" id="file-info"></div>
    <div class="status" id="status"></div>

    <div class="actions">
      <button class="btn btn-export" id="export-btn" style="display:none" onclick="exportHTML()">
        Export HTML
      </button>
    </div>
  </div>
  <p style="text-align:center; margin-top:16px; font-size:0.8rem; color:#999;">by: Arun Ramasamy</p>

  <script>
    let convertedHTML = '';
    let outputFilename = '';

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (!file.name.endsWith('.md')) {
        showStatus('Please select a valid .md file.', 'error');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const markdown = e.target.result;
          const rawHTML = marked.parse(markdown);
          // Wrap tables for horizontal scroll on small screens
          const bodyContent = rawHTML.replace(/<table/g, '<div class="table-wrapper"><table').replace(/<\/table>/g, '</table></div>');

          outputFilename = file.name.replace(/\.md$/, '.html');

          convertedHTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${escapeHtml(file.name.replace(/\.md$/, ''))}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 40px 0;
      padding: 0 20px;
      line-height: 1.7;
      color: #1a1a1a;
      font-size: 16px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    h1, h2, h3, h4, h5, h6 { margin: 1.5em 0 0.5em; line-height: 1.3; }
    h1 { font-size: 1.8rem; }
    h2 { font-size: 1.4rem; }
    h3 { font-size: 1.2rem; }
    p { margin: 0.8em 0; }
    a { color: #2563eb; word-break: break-all; }
    pre {
      background: #f4f4f4;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.85em;
      white-space: pre-wrap;
      word-break: break-word;
    }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    pre code { background: none; padding: 0; }
    blockquote {
      border-left: 4px solid #d1d5db;
      margin: 1em 0;
      padding: 0.5em 1em;
      color: #555;
    }
    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #d1d5db; padding: 8px 12px; text-align: left; }
    th { background: #f9fafb; }
    img { max-width: 100%; height: auto; display: block; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 2em 0; }
    @media (max-width: 600px) {
      body { padding: 0 14px; margin: 20px 0; font-size: 15px; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; }
      h3 { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
${bodyContent}
</body>
</html>`;

          document.getElementById('file-info').style.display = 'block';
          document.getElementById('file-info').textContent = `File: ${file.name}  \u2022  Output: ${outputFilename}`;
          document.getElementById('export-btn').style.display = 'inline-flex';
          showStatus('Markdown parsed successfully. Click "Export HTML" to download.', 'success');
        } catch (err) {
          showStatus('Failed to parse markdown: ' + err.message, 'error');
        }
      };
      reader.readAsText(file);

      // Reset so the same file can be re-selected
      event.target.value = '';
    }

    function exportHTML() {
      if (!convertedHTML) return;
      const blob = new Blob([convertedHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = outputFilename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showStatus(message, type) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status ' + type;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
