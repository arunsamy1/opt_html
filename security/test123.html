<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Chart Calendar</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript">
    google.charts.load('current', {'packages': ['calendar']});
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      const dataTable = new google.visualization.DataTable();
      dataTable.addColumn({ type: 'date', id: 'Date' });
      dataTable.addColumn({ type: 'number', id: 'Value' });

      // Generate the current month's dates with dummy values
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth(); // 0-based month

      const data = [];
      const daysInMonth = new Date(year, month + 1, 0).getDate(); // Last day of the month
      for (let day = 1; day <= daysInMonth; day++) {
        data.push([new Date(year, month, day), Math.floor(Math.random() * 10)]); // Random value for demo
      }

      dataTable.addRows(data);

      const chart = new google.visualization.Calendar(document.getElementById('calendar_basic'));

      const options = {
        title: `Calendar for ${today.toLocaleString('default', { month: 'long' })} ${year}`,
        height: 350,
      };

      chart.draw(dataTable, options);
    }
  </script>
</head>
<body>
  <h1>Monthly Calendar Visualization</h1>
  <div id="calendar_basic" style="width: 100%; height: 400px;"></div>
</body>
</html>
