<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin to USD Converter</title>
</head>
<body>
    <h1>Bitcoin to USD Converter</h1>
    <label for="bitcoinAmount">Enter Bitcoin amount:</label>
    <input type="number" id="bitcoinAmount" placeholder="e.g., 0.5" step="0.0001">
    <button onclick="convertToUSD()">Convert</button>
    <p id="result"></p>

    <script>
        async function convertToUSD() {
            const bitcoinAmount = parseFloat(document.getElementById("bitcoinAmount").value);

            if (isNaN(bitcoinAmount) || bitcoinAmount <= 0) {
                document.getElementById("result").textContent = "Please enter a valid Bitcoin amount.";
                return;
            }

            try {
                const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
                const data = await response.json();

                const bitcoinToUSD = data.bitcoin.usd;
                const usdValue = bitcoinAmount * bitcoinToUSD;

                document.getElementById("result").textContent = 
                    `${bitcoinAmount} BTC is approximately $${usdValue.toFixed(2)} USD.`;
            } catch (error) {
                console.error("Error fetching Bitcoin data:", error);
                document.getElementById("result").textContent = "Error fetching the conversion rate. Please try again later.";
            }
        }
    </script>
</body>
</html>
