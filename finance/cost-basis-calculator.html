<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Basis for Double Down</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .calculator {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .row {
            display: table;
            width: 100%;
            table-layout: fixed;
            margin-bottom: 15px;
        }
        .field {
            display: table-cell;
            padding: 0 7px;
        }
        .field:first-child {
            padding-left: 0;
        }
        .field:last-child {
            padding-right: 0;
        }
        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a1a2e;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .field input {
            width: 100%;
            height: 48px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }
        .field input:focus {
            outline: none;
            border-color: #e94560;
        }
        .field.result input {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            font-weight: 600;
        }

        @media (max-width: 700px) {
            body {
                margin: 20px auto;
                padding: 15px;
            }
            h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }
            .calculator {
                padding: 20px;
            }
            .row {
                display: block;
                margin-bottom: 0;
            }
            .field {
                display: block;
                padding: 0 0 15px 0;
                width: 100%;
            }
            .field:last-child {
                padding-bottom: 0;
            }
        }
    </style>
</head>
<body>
    <h1>Cost Basis for Double Down</h1>
    
    <div class="calculator">
        <div class="row">
            <div class="field">
                <label for="currentQuantity">Current quantity</label>
                <input type="number" id="currentQuantity" placeholder="0" oninput="calculate()">
            </div>
            <div class="field">
                <label for="currentCostBasis">Current cost Basis ($)</label>
                <input type="number" id="currentCostBasis" placeholder="0.00" step="0.01" oninput="calculate()">
            </div>
            <div class="field result">
                <label>Current Spent cost ($)</label>
                <input type="text" id="currentSpentCost" readonly>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label for="simAdditionalStock">Sim one time additional stock</label>
                <input type="number" id="simAdditionalStock" placeholder="0" oninput="calculate()">
            </div>
            <div class="field">
                <label for="simPurchasePrice">Sim Purchase Price ($)</label>
                <input type="number" id="simPurchasePrice" placeholder="0.00" step="0.01" oninput="calculate()">
            </div>
            <div class="field result">
                <label>Sim Total Purchase Cost ($)</label>
                <input type="text" id="simTotalPurchaseCost" readonly>
            </div>
        </div>

        <div class="row">
            <div class="field result">
                <label>Sim Total Share</label>
                <input type="text" id="simTotalShare" readonly>
            </div>
            <div class="field result">
                <label>Sim Total Cost Basis ($)</label>
                <input type="text" id="simTotalCostBasis" readonly>
            </div>
            <div class="field result">
                <label>Sim Total cost ($)</label>
                <input type="text" id="simTotalCost" readonly>
            </div>
        </div>
    </div>

    <script>
        function formatCurrency(value) {
            return '$' + value.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function calculate() {
            const currentQuantity = parseFloat(document.getElementById('currentQuantity').value) || 0;
            const currentCostBasis = parseFloat(document.getElementById('currentCostBasis').value) || 0;
            const simAdditionalStock = parseFloat(document.getElementById('simAdditionalStock').value) || 0;
            const simPurchasePrice = parseFloat(document.getElementById('simPurchasePrice').value) || 0;

            const currentSpentCost = currentQuantity * currentCostBasis;
            const simTotalPurchaseCost = simAdditionalStock * simPurchasePrice;
            const simTotalShare = currentQuantity + simAdditionalStock;
            const simTotalCostBasis = (currentCostBasis + simPurchasePrice) / 2;
            const simTotalCost = currentSpentCost + simTotalPurchaseCost;

            document.getElementById('currentSpentCost').value = formatCurrency(currentSpentCost);
            document.getElementById('simTotalPurchaseCost').value = formatCurrency(simTotalPurchaseCost);
            document.getElementById('simTotalShare').value = simTotalShare;
            document.getElementById('simTotalCostBasis').value = formatCurrency(simTotalCostBasis);
            document.getElementById('simTotalCost').value = formatCurrency(simTotalCost);
        }
    </script>
</body>
</html>
